services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: isibi
      POSTGRES_PASSWORD: isibi_dev
      POSTGRES_DB: isibi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://isibi:isibi_dev@db:5432/isibi
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-local-only-not-for-production}
    depends_on:
      - db
      - redis

volumes:
  pgdata:
