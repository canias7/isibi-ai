services:
  - type: web
    name: isibi-backend
    runtime: docker
    region: oregon
    # Dockerfile lives in backend/. Render builds the image from the backend
    # directory and uses the Dockerfile's CMD/EXPOSE at runtime.
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256

  - type: web
    name: isibi-frontend
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://isibi-backend.onrender.com/api
