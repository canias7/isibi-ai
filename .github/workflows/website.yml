name: Website (Cloudflare Pages)

# Builds the web app and deploys it to Cloudflare Pages on every push to main.
# This replaced Vercel as the desktop-website host (the phone app's OTA bundle
# is separate — see web-ota.yml).
#
# Needs two repo secrets:
#   CLOUDFLARE_API_TOKEN  — scoped token with Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID — the Cloudflare account id (dashboard sidebar)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Build web bundle
        run: npm run build

      # First run creates the Pages project; later runs no-op on this step.
      - name: Ensure Pages project exists
        run: npx wrangler pages project create gofarther --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=gofarther --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
