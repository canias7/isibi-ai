name: Build Desktop App

on:
  push:
    paths:
      - "desktop/**"
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: desktop
        run: npm install
      - name: Build React renderer
        working-directory: desktop
        run: npx vite build
      - name: Build macOS
        working-directory: desktop
        run: npx electron-builder --mac --publish never
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: desktop/dist/ISIBI-Control-Center-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: desktop
        run: npm install
      - name: Build React renderer
        working-directory: desktop
        run: npx vite build
      - name: Build Windows
        working-directory: desktop
        run: npx electron-builder --win --publish never
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: desktop/dist/ISIBI-Control-Center-Setup.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: desktop
        run: npm install
      - name: Build React renderer
        working-directory: desktop
        run: npx vite build
      - name: Build Linux
        working-directory: desktop
        run: npx electron-builder --linux --publish never
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: desktop/dist/ISIBI-Control-Center.AppImage

  release:
    name: Create Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: List artifacts
        run: find artifacts -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ISIBI Control Center v${{ steps.version.outputs.version }}
          body: |
            Download the ISIBI Control Center desktop app for your platform:
            - **macOS**: Download the `.zip` file, unzip and open the app
            - **Windows**: Download and run the `.exe` installer
            - **Linux**: Download the `.AppImage`, make it executable and run it
          draft: false
          prerelease: false
          files: |
            artifacts/mac-build/ISIBI-Control-Center-macOS.zip
            artifacts/win-build/ISIBI-Control-Center-Setup.exe
            artifacts/linux-build/ISIBI-Control-Center.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
