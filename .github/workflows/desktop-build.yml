name: Build Desktop App

on:
  push:
    paths:
      - "desktop/**"
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build macOS DMG
        working-directory: desktop
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            desktop/dist/*.zip
            desktop/dist/*.yml

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows installer
        working-directory: desktop
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            desktop/dist/*.exe
            desktop/dist/*.yml

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Linux AppImage
        working-directory: desktop
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.yml

  release:
    name: Create Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: List artifacts
        run: find artifacts -type f

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ISIBI Control Center v${{ steps.version.outputs.version }}
          body: |
            Download the ISIBI Control Center desktop app for your platform:
            - **macOS**: Download the `.zip` file, unzip and open the app
            - **Windows**: Download and run the `.exe` installer
            - **Linux**: Download the `.AppImage`, make it executable (`chmod +x`), and run it
          draft: false
          prerelease: false
          files: |
            artifacts/mac-build/*.zip
            artifacts/mac-build/*.yml
            artifacts/win-build/*.exe
            artifacts/win-build/*.yml
            artifacts/linux-build/*.AppImage
            artifacts/linux-build/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
