name: iOS Build

# Builds, signs, and ships the iOS app (Capacitor wrapper around the Vite web
# app) to TestFlight from a macOS runner — no Mac required on your end.
#
# Uses AUTOMATIC signing: Xcode creates and manages the distribution
# certificate and provisioning profile itself, authenticated with an App Store
# Connect API key. So the ONLY secrets you need are the API key (no .p12, no
# provisioning profile):
#   APP_STORE_CONNECT_KEY_ID     - the key's Key ID
#   APP_STORE_CONNECT_ISSUER_ID  - your App Store Connect Issuer ID
#   APP_STORE_CONNECT_API_KEY    - the full text of the AuthKey_XXXXX.p8 file
#
# Without the API key the job is a cheap no-op (so it doesn't burn macOS minutes).
#
# Native builds are EXPENSIVE and unnecessary for web/UI changes — those ship
# over-the-air (see web-ota.yml + src/ota.ts). So only cut a new TestFlight
# version when something NATIVE actually changes (the iOS project, Capacitor
# config, dependencies), or when triggered manually (use this for releases).
#
# Rebuild: bake in the Supabase-Storage-aware OTA (src/ota.ts) so installed
# apps switch to the reliable Storage host immediately. (Retry after a
# filename-casing fix that broke the macOS tsc build.)
on:
  push:
    branches: [claude/zealous-sagan-TA5qG]
    paths:
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  APPLE_TEAM_ID: MY8LTVJQ82
  BUNDLE_ID: com.gofarther.app

jobs:
  ios:
    runs-on: macos-15
    steps:
      - name: Check App Store Connect secret
        id: signing
        env:
          ASC: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          if [ -n "$ASC" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No APP_STORE_CONNECT_API_KEY secret set — skipping iOS build. Add the 3 App Store Connect API key secrets to build + ship to TestFlight."
          fi

      - uses: actions/checkout@v4
        if: steps.signing.outputs.present == 'true'

      - uses: actions/setup-node@v4
        if: steps.signing.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.signing.outputs.present == 'true'
        run: npm ci

      # Apple requires apps to be built with the latest iOS SDK, so pick the
      # newest Xcode installed on the runner.
      - name: Select newest Xcode
        if: steps.signing.outputs.present == 'true'
        run: |
          echo "Installed Xcodes:"; ls -d /Applications/Xcode_*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version
          echo "iOS SDKs:"; xcodebuild -showsdks | grep -i iphoneos || true

      - name: Build web bundle + sync Capacitor
        if: steps.signing.outputs.present == 'true'
        run: |
          # Bake the commit timestamp in as the bundle version so OTA can tell
          # whether a published web bundle is newer than this native build.
          export APP_VERSION="$(git show -s --format=%ct HEAD)"
          npm run build
          npx cap sync ios

      - name: Write App Store Connect API key to a file
        id: asc
        if: steps.signing.outputs.present == 'true'
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/asc_key.p8"
          printf '%s' "$ASC_KEY" > "$KEY_PATH"
          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      # Archive WITH automatic signing (App Store Connect API key + provisioning
      # updates). This is required for push: an unsigned archive carries no
      # entitlements, so the exported app ended up with no valid aps-environment
      # and APNs registration failed at runtime. Signing here bakes in the
      # entitlement and lets -allowProvisioningUpdates register the Push
      # Notifications capability on the App ID + mint a matching profile.
      - name: Archive (signed, automatic)
        if: steps.signing.outputs.present == 'true'
        run: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc.outputs.key_path }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGN_STYLE=Automatic \
            clean archive

      - name: Export IPA (app-store)
        id: export
        if: steps.signing.outputs.present == 'true'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>automatic</string>
            <key>compileBitcode</key><false/>
            <key>stripSwiftSymbols</key><true/>
          </dict></plist>
          EOF
          # Retry: export talks to Apple's servers to mint the distribution
          # cert/profile and can hit transient "network connection was lost".
          n=0
          until [ "$n" -ge 3 ]; do
            rm -rf "$RUNNER_TEMP/export"
            xcodebuild -exportArchive \
              -archivePath "$RUNNER_TEMP/App.xcarchive" \
              -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
              -exportPath "$RUNNER_TEMP/export" \
              -allowProvisioningUpdates \
              -authenticationKeyPath "${{ steps.asc.outputs.key_path }}" \
              -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
              -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" && break
            n=$((n + 1))
            echo "::warning::export failed (attempt $n) — retrying in 20s"
            sleep 20
          done
          [ "$n" -lt 3 ] || { echo "::error::exportArchive failed after 3 attempts"; exit 1; }
          ls -la "$RUNNER_TEMP/export"
          echo "ipa=$(ls "$RUNNER_TEMP/export/"*.ipa | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        if: steps.signing.outputs.present == 'true'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.export.outputs.ipa }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      - name: Publish IPA to a GitHub Release (backup copy)
        if: steps.signing.outputs.present == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-latest
          name: Go Farther — iOS (latest build)
          prerelease: true
          files: ${{ runner.temp }}/export/*.ipa
