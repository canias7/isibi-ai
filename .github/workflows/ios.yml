name: iOS Build

# Builds & signs the native iOS app (Capacitor wrapper around the Vite web app)
# on a macOS runner, then publishes the IPA to a GitHub Release.
#
# Requires three repository secrets (see README "iOS signing"):
#   APPLE_CERTIFICATE_BASE64        - your distribution cert (.p12), base64
#   APPLE_CERTIFICATE_PASSWORD      - password for that .p12
#   APPLE_PROVISIONING_PROFILE_BASE64 - the .mobileprovision, base64
# Team ID, bundle ID and profile name are read from the profile automatically.
# Optional repo variable IOS_EXPORT_METHOD: app-store (default) | ad-hoc | development
#
# Without the secrets the job is a cheap no-op (so it doesn't burn macOS minutes).
on:
  push:
    branches: [claude/zealous-sagan-TA5qG]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ios:
    runs-on: macos-14
    steps:
      - name: Check signing secrets
        id: signing
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          ASC: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          if [ -n "$CERT" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No APPLE_CERTIFICATE_BASE64 secret set — skipping iOS build. Add the signing secrets to produce an IPA."
          fi
          if [ -n "$ASC" ]; then echo "asc=true" >> "$GITHUB_OUTPUT"; else echo "asc=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/checkout@v4
        if: steps.signing.outputs.present == 'true'

      - uses: actions/setup-node@v4
        if: steps.signing.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.signing.outputs.present == 'true'
        run: npm ci

      - name: Build web bundle + sync Capacitor
        if: steps.signing.outputs.present == 'true'
        run: |
          npm run build
          npx cap sync ios

      - name: Import signing certificate
        if: steps.signing.outputs.present == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile & derive identifiers
        if: steps.signing.outputs.present == 'true'
        id: profile
        env:
          PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_B64" | base64 -d > "$RUNNER_TEMP/pp.mobileprovision"
          security cms -D -i "$RUNNER_TEMP/pp.mobileprovision" > "$RUNNER_TEMP/pp.plist"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/pp.plist")
          NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/pp.plist")
          TEAM=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$RUNNER_TEMP/pp.plist")
          APPID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$RUNNER_TEMP/pp.plist")
          BUNDLE_ID="${APPID#${TEAM}.}"
          cp "$RUNNER_TEMP/pp.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          # Pick the export method matching the profile type (override via the
          # IOS_EXPORT_METHOD repo variable).
          METHOD="${{ vars.IOS_EXPORT_METHOD }}"
          if [ -z "$METHOD" ]; then
            if /usr/libexec/PlistBuddy -c 'Print :ProvisionedDevices' "$RUNNER_TEMP/pp.plist" >/dev/null 2>&1; then
              if /usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$RUNNER_TEMP/pp.plist" 2>/dev/null | grep -qi true; then
                METHOD=development
              else
                METHOD=ad-hoc
              fi
            else
              METHOD=app-store
            fi
          fi
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "team=$TEAM" >> "$GITHUB_OUTPUT"
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"
          echo "method=$METHOD" >> "$GITHUB_OUTPUT"
          echo "Profile '$NAME' ($UUID) team=$TEAM bundle=$BUNDLE_ID method=$METHOD"

      - name: Archive
        if: steps.signing.outputs.present == 'true'
        run: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{ steps.profile.outputs.team }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ steps.profile.outputs.bundle_id }}" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.profile.outputs.name }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            clean archive

      - name: Export IPA
        id: export
        if: steps.signing.outputs.present == 'true'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>${{ steps.profile.outputs.method }}</string>
            <key>teamID</key><string>${{ steps.profile.outputs.team }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key><dict>
              <key>${{ steps.profile.outputs.bundle_id }}</key><string>${{ steps.profile.outputs.name }}</string>
            </dict>
            <key>compileBitcode</key><false/>
            <key>stripSwiftSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"
          ls -la "$RUNNER_TEMP/export"
          echo "ipa=$(ls "$RUNNER_TEMP/export/"*.ipa | head -1)" >> "$GITHUB_OUTPUT"

      - name: Publish IPA to a GitHub Release
        if: steps.signing.outputs.present == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-latest
          name: Go Farther — iOS (latest build)
          prerelease: true
          files: ${{ runner.temp }}/export/*.ipa

      # Uploads to TestFlight when App Store Connect API credentials are set and
      # the profile is an App Store one. (app-store IPAs can't be sideloaded.)
      - name: Upload to TestFlight
        if: steps.signing.outputs.present == 'true' && steps.signing.outputs.asc == 'true' && steps.profile.outputs.method == 'app-store'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.export.outputs.ipa }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
