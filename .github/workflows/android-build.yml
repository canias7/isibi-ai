name: Android Build

# Builds the native Android app on GitHub (replaces EAS Build).
# - Push a tag like `v1.0.0`  -> signed APK + AAB attached to a GitHub Release.
# - Manual run (workflow_dispatch) -> artifacts only (signed if the keystore
#   secret is present, otherwise an installable debug APK for quick testing).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to attach artifacts to the Release

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode signing keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret — will build a debug APK."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release (APK + AAB)
        if: steps.keystore.outputs.present == 'true'
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build debug APK (no keystore configured)
        if: steps.keystore.outputs.present == 'false'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug

      - name: Collect outputs
        run: |
          mkdir -p out
          find android/app/build/outputs -name '*.apk' -o -name '*.aab' | xargs -I{} cp {} out/ || true
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: out/*
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
