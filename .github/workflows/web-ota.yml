name: Web OTA bundle

# Builds the web app and publishes it (plus a version manifest) for OTA. The
# native app downloads this on launch (see src/ota.ts), so UI/web changes ship
# over-the-air — no new TestFlight/Android build needed.
#
# PRIMARY host is Supabase Storage (direct URLs — reliable, no redirect/throttle
# like GitHub). Needs one repo secret: SUPABASE_SERVICE_ROLE_KEY. The GitHub
# Release publish is kept as a fallback for older builds / if the secret is
# unset.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ota:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # The desktop (Electron) devDeps aren't used for the web build — skip
          # the ~106 MB Electron binary download so OTA CI stays fast.
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      # Use the commit timestamp as a monotonic version, shared with the native
      # build (ios.yml), so ota.ts can compare them and only ever move forward.
      - name: Compute version (commit timestamp)
        run: echo "APP_VERSION=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Build web bundle
        run: npm run build

      - name: Package bundle + manifest
        env:
          # Optional hard floor: set repo variable OTA_MIN_VERSION to a published
          # version timestamp to force every older install to update. Default 0
          # (no floor) — bump it only for a breaking backend-contract release.
          OTA_MIN: ${{ vars.OTA_MIN_VERSION || '0' }}
        run: |
          VERSION="${APP_VERSION}"
          ( cd dist && zip -qr "../dist-${VERSION}.zip" . )
          # The app verifies the downloaded zip against this hash (src/ota.ts) —
          # a swapped or corrupted bundle is rejected instead of activated.
          SHA256=$(sha256sum "dist-${VERSION}.zip" | cut -d' ' -f1)
          echo "OTA_SHA256=${SHA256}" >> "$GITHUB_ENV"
          cat > manifest.json <<EOF
          { "version": "${VERSION}", "min": "${OTA_MIN}", "sha256": "${SHA256}", "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/web-latest/dist-${VERSION}.zip" }
          EOF
          echo "Published version ${VERSION} (min ${OTA_MIN}, sha256 ${SHA256})"; cat manifest.json

      - name: Publish OTA bundle to a GitHub Release (fallback host)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: web-latest
          name: Go Farther — Web OTA bundle
          prerelease: true
          files: |
            dist-*.zip
            manifest.json

      # Primary host: Supabase Storage (reliable direct URLs).
      - name: Check Supabase secret
        id: sb
        env:
          SR: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$SR" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SUPABASE_SERVICE_ROLE_KEY not set — skipping Storage upload (OTA falls back to GitHub). Add it in repo Settings → Secrets."
          fi

      - name: Upload OTA bundle to Supabase Storage
        if: steps.sb.outputs.present == 'true'
        env:
          SR: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OTA_MIN: ${{ vars.OTA_MIN_VERSION || '0' }}
        run: |
          OBJ="https://lkpfeqrelvziltfwpuxi.supabase.co/storage/v1/object/ota"
          PUB="https://lkpfeqrelvziltfwpuxi.supabase.co/storage/v1/object/public/ota"
          curl -fsS -X POST "$OBJ/dist-${APP_VERSION}.zip" \
            -H "Authorization: Bearer $SR" -H "x-upsert: true" \
            -H "Content-Type: application/zip" --data-binary "@dist-${APP_VERSION}.zip"
          cat > manifest-storage.json <<EOF
          { "version": "${APP_VERSION}", "min": "${OTA_MIN:-0}", "sha256": "${OTA_SHA256}", "url": "${PUB}/dist-${APP_VERSION}.zip" }
          EOF
          curl -fsS -X POST "$OBJ/manifest.json" \
            -H "Authorization: Bearer $SR" -H "x-upsert: true" \
            -H "Content-Type: application/json" --data-binary "@manifest-storage.json"
          echo "Uploaded OTA ${APP_VERSION} to Supabase Storage"
