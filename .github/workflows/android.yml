name: Android Build

# Builds the native Android app (Capacitor wrapper around the Vite web app)
# on GitHub — no local Android toolchain needed.
#   - Push a tag like `v1.0.0`  -> APK/AAB attached to a GitHub Release.
#   - Manual run (workflow_dispatch) -> APK as a downloadable artifact.
# Builds a signed release if the keystore secrets are set, otherwise an
# installable debug APK so you can try it immediately.
on:
  push:
    branches: [claude/zealous-sagan-TA5qG]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle + sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Decode signing keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret — building a debug APK."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release (APK + AAB)
        if: steps.keystore.outputs.present == 'true'
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build debug APK (no keystore configured)
        if: steps.keystore.outputs.present == 'false'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug

      - name: Collect outputs
        run: |
          mkdir -p out
          find android/app/build/outputs \( -name '*.apk' -o -name '*.aab' \) -exec cp {} out/ \;
          ls -la out

      # Publish to a Release (not an artifact) — Releases don't count against the
      # Actions artifact-storage quota, and action-gh-release creates the tag
      # server-side, so this works even when tag pushes are blocked locally.
      - name: Publish APK to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Go Farther — Android (latest build)
          prerelease: true
          files: out/*
