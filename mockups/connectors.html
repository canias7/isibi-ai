<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Connectors — mockup</title>
<style>
  :root{
    --text:#f4f5f7; --dim:#8a9099;
    --card:rgba(255,255,255,0.045); --card-active:rgba(255,255,255,0.08);
    --line:rgba(255,255,255,0.10);
    --gold:#e0a13a; --green:#46d17f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:#000; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; align-items:flex-start;
  }
  .screen{
    position:relative; width:100%; max-width:412px; min-height:100vh;
    background:radial-gradient(460px 460px at 50% 38%, rgba(224,161,58,0.12), transparent 70%), #08080a;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .screen::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size:22px 22px;
  }
  .status{display:flex; justify-content:space-between; align-items:center; padding:10px 22px 2px; font-size:14px; font-weight:600; position:relative; z-index:2;}
  .status .dots{display:flex; gap:6px; align-items:center; opacity:.9;}
  .status .batt{width:22px;height:11px;border:1.5px solid #fff;border-radius:3px;position:relative;opacity:.9;}
  .status .batt::after{content:"";position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:60%;background:#fff;border-radius:1px;}

  .top{position:relative; flex-shrink:0; padding:10px 16px 6px; text-align:center; z-index:2;}
  .top h1{font-size:19px; font-weight:700; margin:0;}
  .top .sub{font-size:13px; color:var(--dim); margin:4px 0 0;}
  .iconbtn{position:absolute; top:6px; left:14px; width:34px; height:34px; border:none;
    background:rgba(255,255,255,0.06); color:var(--text); border-radius:50%; display:grid; place-items:center; cursor:pointer;}
  .iconbtn:active{background:rgba(255,255,255,0.14);}
  .iconbtn.right{left:auto; right:14px;}

  /* ===== constellation of connected apps ===== */
  .sky{position:relative; height:332px; flex-shrink:0; z-index:1;}
  .lines{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
  .lines line{stroke:rgba(255,255,255,0.12); stroke-width:1;}
  .lines line.gold{stroke:rgba(224,161,58,0.5); stroke-dasharray:3 5;}

  .core{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:62px; height:62px; border-radius:19px; display:grid; place-items:center; color:#2a1c05;
    background:linear-gradient(160deg,#ffce6f,#e0951f); animation:pulse 3s ease-in-out infinite; z-index:2;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,.25), 0 0 36px 4px rgba(224,161,58,.40);}
    50%{box-shadow:0 0 0 1px rgba(255,255,255,.30), 0 0 54px 10px rgba(224,161,58,.55);}
  }

  .node{position:absolute; transform:translate(-50%,-50%); z-index:3;}
  .floaty{
    display:flex; align-items:center; gap:9px; padding:6px 13px 6px 6px;
    border:1px solid rgba(255,255,255,0.12); background:rgba(20,20,24,0.72);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:16px;
    box-shadow:0 6px 20px rgba(0,0,0,.35);
  }
  .floaty .tile{
    flex-shrink:0; width:36px; height:36px; border-radius:11px; background:#f6f7f9;
    display:grid; place-items:center; box-shadow:0 0 0 2px var(--green);
  }
  .node.warn .floaty .tile{box-shadow:0 0 0 2px var(--gold); animation:ring 2s ease-in-out infinite;}
  @keyframes ring{0%,100%{box-shadow:0 0 0 2px var(--gold);}50%{box-shadow:0 0 0 2px var(--gold), 0 0 14px 2px rgba(224,161,58,.6);}}
  .floaty .lab{display:flex; flex-direction:column; line-height:1.15;}
  .floaty .lab b{font-size:14px; font-weight:600;}
  .floaty .lab small{font-size:11px; color:var(--dim);}
  .floaty .lab small.gold{color:var(--gold); font-weight:600;}

  .f1{animation:fl1 5.5s ease-in-out infinite;}
  .f2{animation:fl2 6.4s ease-in-out infinite;}
  .f3{animation:fl3 5.9s ease-in-out infinite;}
  @keyframes fl1{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes fl2{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-7px)}}
  @keyframes fl3{0%,100%{transform:translate(0,0)}50%{transform:translate(-5px,8px)}}

  /* ===== add more list ===== */
  .body{flex:1; min-height:0; overflow-y:auto; padding:2px 16px 40px; position:relative; z-index:2; width:100%; max-width:640px; margin:0 auto;}
  .sec{font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--dim); margin:10px 4px 8px;}
  .card{display:flex; align-items:center; gap:13px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:11px 14px; margin-bottom:10px; cursor:pointer; transition:background .15s ease;}
  .card:active{background:var(--card-active);}
  .ctile{flex-shrink:0; width:42px; height:42px; border-radius:12px; background:#f6f7f9; display:grid; place-items:center; border:1px solid rgba(0,0,0,0.06);}
  .meta{flex:1; min-width:0;}
  .nm{font-size:16px; font-weight:600;}
  .ds{font-size:13px; color:var(--dim); margin-top:2px;}
  .pill{flex-shrink:0; border:1px solid rgba(255,255,255,0.18); background:transparent; color:var(--text);
    font:inherit; font-size:14px; font-weight:600; padding:8px 16px; border-radius:16px; cursor:pointer;}
  .pill:active{background:rgba(255,255,255,0.08);}
</style>
</head>
