<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Login — current</title>
<style>
  :root{
    --bg:#000000; --composer:#161618; --text:#f5f5f7; --text-dim:#8e8e93; --accent:#ffffff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:#0b0b0c; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; align-items:flex-start;
  }
  .screen{ position:relative; width:100%; max-width:412px; min-height:100vh; background:var(--bg); overflow:hidden; }

  /* ---- the real living background: drifting white glows on black ---- */
  .live-bg{ position:absolute; inset:0; z-index:0; overflow:hidden; background:#000; pointer-events:none; }
  .live-bg .orb{ position:absolute; border-radius:50%; }
  .orb1{ width:78vw; height:78vw; left:-20vw; top:-12vh; background:radial-gradient(circle at center, rgba(255,255,255,0.10), rgba(255,255,255,0) 65%); animation:drift1 24s ease-in-out infinite; }
  .orb2{ width:88vw; height:88vw; right:-28vw; bottom:-10vh; background:radial-gradient(circle at center, rgba(255,255,255,0.07), rgba(255,255,255,0) 65%); animation:drift2 30s ease-in-out infinite; }
  .orb3{ width:62vw; height:62vw; left:19vw; top:24vh; background:radial-gradient(circle at center, rgba(255,255,255,0.13), rgba(255,255,255,0) 60%); animation:breathe 7s ease-in-out infinite; }
  .orb4{ width:130vw; height:52vh; left:-15vw; bottom:-24vh; background:radial-gradient(ellipse at center, rgba(255,255,255,0.06), rgba(255,255,255,0) 60%); animation:breathe 9s ease-in-out infinite; }
  @keyframes drift1{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(9vw,6vh) scale(1.15);} }
  @keyframes drift2{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-11vw,-5vh) scale(1.12);} }
  @keyframes breathe{ 0%,100%{transform:scale(1); opacity:.5;} 50%{transform:scale(1.18); opacity:.9;} }
  .status{position:relative; z-index:2; display:flex; justify-content:space-between; align-items:center; padding:10px 22px 2px; font-size:14px; font-weight:600; color:#fff;}
  .status .dots{display:flex; gap:6px; align-items:center; opacity:.9;}
  .status .batt{width:22px;height:11px;border:1.5px solid #fff;border-radius:3px;position:relative;opacity:.9;}
  .status .batt::after{content:"";position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:60%;background:#fff;border-radius:1px;}

  /* ---- the real .auth styles ---- */
  .auth{
    position:relative; z-index:1;
    min-height:calc(100vh - 30px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:24px 16px;
  }
  .auth-brand{ font-size:34px; font-weight:700; }
  .auth-card{ width:100%; max-width:360px; display:flex; flex-direction:column; gap:14px; text-align:center; }
  .auth-sub{ color:var(--text-dim); font-size:14px; margin:-6px 0 4px; }
  .auth-form{ display:flex; flex-direction:column; gap:10px; text-align:left; }
  .auth-input{
    background:var(--composer); border:1px solid #ffffff1f; border-radius:12px; color:var(--text);
    font:inherit; font-size:16px; padding:13px 14px; outline:none;
  }
  .auth-input:focus{ border-color:#ffffff55; }
  .auth-input::placeholder{ color:var(--text-dim); }
  .auth-btn{
    margin-top:4px; background:var(--accent); color:#000; border:none; border-radius:12px;
    font:inherit; font-size:15px; font-weight:600; padding:13px; cursor:pointer;
  }
  .auth-toggle{ background:none; border:none; color:var(--text-dim); font:inherit; font-size:13px; cursor:pointer; padding:6px; }
</style>
</head>
<body>
  <div class="screen">
    <div class="live-bg" aria-hidden="true">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
      <div class="orb orb4"></div>
    </div>
    <div class="status">
      <span>9:41</span>
      <span class="dots">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="#fff"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="2.5" width="3" height="9.5" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <span style="font-size:12px;font-weight:700;">5G</span><span class="batt"></span>
      </span>
    </div>

    <div class="auth">
      <div class="auth-card">
        <div class="auth-brand">Go Farther</div>
        <p class="auth-sub">Sign in to continue</p>
        <form class="auth-form" onsubmit="return false">
          <input class="auth-input" type="email" placeholder="Email" />
          <input class="auth-input" type="password" placeholder="Password" />
          <button class="auth-btn" type="submit">Sign in</button>
        </form>
        <button class="auth-toggle">Don't have an account? Sign up</button>
      </div>
    </div>
  </div>
</body>
</html>
